<html lang="en">
<head>

  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="nav-inner">
      <a href="../index.html" class="nav-brand">JK</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="nav-links" aria-label="Main navigation">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="https://github.com/jek821" target="_blank" rel="noreferrer">GitHub</a>
        <a href="../assets/docs/Jacob_Kriss_Resume.pdf" target="_blank" rel="noreferrer" class="btn-primary">Resume</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="page-header-inner">
        <p class="page-eyebrow">01 / Projects</p>
        <h1 class="page-title">Projects</h1>
        <p class="page-subtitle">Open-source tools, distributed systems, and full-stack applications.</p>
      </div>
    </div>

  <footer class="site-footer">

  <script src="../assets/js/projects.js"></script>
  <script>
    (function () {
      var toggle = document.getElementById('nav-toggle');
      var links = document.getElementById('nav-links');
      toggle.addEventListener('click', function () {
        var expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!expanded));
        this.setAttribute('aria-label', expanded ? 'Open navigation' : 'Close navigation');
        links.classList.toggle('is-open');
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.setAttribute('aria-label', 'Open navigation');
        });
      });
    })();
  </script>

</body>
</html>
